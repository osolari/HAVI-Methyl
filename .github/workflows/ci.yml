name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,experiments]"

      - name: Lint (ruff)
        run: |
          python -m ruff check src tests scripts
          python -m ruff format --check src tests scripts

      - name: Type-check (mypy)
        run: python -m mypy src/havi_methyl

      - name: Test
        run: python -m pytest tests -v --tb=short

      - name: Smoke-run scripts (fast mode)
        run: bash scripts/run_all.sh --fast

  torch-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install with torch
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,experiments,torch]"
      - name: Run torch-only tests
        run: python -m pytest tests -v -k torch --tb=short
